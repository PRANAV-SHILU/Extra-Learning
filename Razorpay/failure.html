<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Failed - Premium Store</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <div class="container">
        <div class="icon-circle failure-icon-circle">
            <div class="icon failure-icon">✕</div>
        </div>
        <h1 class="status-title failure-title">Payment Failed</h1>
        <p class="status-desc">We couldn't process your transaction. This could be due to insufficient funds or a network issue.</p>
        <a href="/" class="btn btn-dark">Try Again</a>
    </div>
</body>
</html>
